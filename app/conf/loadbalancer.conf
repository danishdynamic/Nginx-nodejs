upstream backend_servers {
    server 127.0.0.1:3001 weight=2; 
    server 127.0.0.1:3002 weight=1;
}

server {
    listen 8080;

    # 1. This serves your HTML and CSS
    location / {
        root "C:/Users/shake/screenshots/nginx-nodejs/app/public"; 
        index index.html;
    }

    # 2. This handles the 'fetch(/api)' calls from your JS
    location /api {
        proxy_pass http://backend_servers;
    }
}